# iOS KMP build is parked until the Android app is stable.
# Re-enable by restoring the `on:` triggers below.
# on:
#   push:
#     branches: [main]
#     paths:
#       - 'AptuKMP/**'
#       - 'crates/aptu-ffi/**'
#       - '.github/workflows/ios-kmp.yml'
#   pull_request:
#     branches: [main]
#     paths:
#       - 'AptuKMP/**'
#       - 'crates/aptu-ffi/**'
#       - '.github/workflows/ios-kmp.yml'

name: iOS KMP Build

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.caching=true -Dorg.gradle.parallel=true -Dorg.gradle.daemon=false

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check AptuKMP directory
        id: check-dir
        run: |
          if [ -f "AptuKMP/gradlew" ] && [ -d "AptuKMP/shared" ] && [ -d "AptuKMP/iosApp" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "AptuKMP subprojects not yet present on this branch - skipping build steps"
          fi
      - name: Install Rust
        if: steps.check-dir.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-ios-sim
      - name: Cache Rust registry and build artifacts
        if: steps.check-dir.outputs.exists == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-targets: true
      - name: Cache Gradle dependencies and wrapper
        if: steps.check-dir.outputs.exists == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('AptuKMP/**/*.gradle.kts', 'AptuKMP/**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Cache gobley-uniffi-bindgen
        if: steps.check-dir.outputs.exists == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: AptuKMP/shared/build/gobley-tools-install
          key: gobley-uniffi-bindgen-0.3.7-${{ runner.os }}
      - name: Set up Java
        if: steps.check-dir.outputs.exists == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Set SDKROOT for iOS simulator cross-compilation
        if: steps.check-dir.outputs.exists == 'true'
        run: |
          echo "SDKROOT=$(xcrun --sdk iphonesimulator --show-sdk-path)" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_APPLE_IOS_SIM_LINKER=$(xcrun --find clang)" >> "$GITHUB_ENV"
          echo "CC_aarch64_apple_ios_sim=$(xcrun --sdk iphonesimulator --find clang)" >> "$GITHUB_ENV"
          echo "AR_aarch64_apple_ios_sim=$(xcrun --find ar)" >> "$GITHUB_ENV"
      - name: Build iOS simulator framework
        if: steps.check-dir.outputs.exists == 'true'
        working-directory: AptuKMP
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --parallel --build-cache
      - name: Build iOS app
        if: steps.check-dir.outputs.exists == 'true'
        working-directory: AptuKMP/iosApp
        run: |
          if ls iosApp/*.xcodeproj 1>/dev/null 2>&1; then
            xcodebuild \
              -scheme iosApp \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              build
          else
            echo "Skipping iOS app build: iosApp.xcodeproj not yet generated (see known TODOs)"
          fi

  ci-result:
    name: CI Result
    runs-on: ubuntu-24.04-arm
    permissions: {}
    if: always()
    needs: [build]
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs passed or were skipped."
