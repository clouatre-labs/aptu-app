name: Android KMP Build

on:
  push:
    branches: [main]
    paths:
      - 'AptuKMP/**'
      - 'crates/aptu-ffi/**'
      - '.github/workflows/android-kmp.yml'
  pull_request:
    branches: [main]
    paths:
      - 'AptuKMP/**'
      - 'crates/aptu-ffi/**'
      - '.github/workflows/android-kmp.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.caching=true -Dorg.gradle.parallel=true -Dorg.gradle.daemon=false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set JAVA_HOME to Java 21
        run: echo "JAVA_HOME=$JAVA_HOME_21_X64" >> "$GITHUB_ENV"
      - name: Add Android Rust target
        # Rust is pre-installed on ubuntu-24.04; just add the cross-compilation target.
        # arm64-v8a only: x86_64 doubles Rust compile time with no CI benefit.
        # Note: ubuntu-24.04 runner uses x86_64 NDK host binaries; ARM64 Linux NDK host
        # support is not yet available (android/ndk#1752). Stay on ubuntu-24.04 (x86_64).
        run: rustup target add aarch64-linux-android
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-targets: true
      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('AptuKMP/**/*.gradle.kts', 'AptuKMP/**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Cache gobley-uniffi-bindgen
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: AptuKMP/shared/build/gobley-tools-install
          key: gobley-uniffi-bindgen-0.3.7-${{ runner.os }}
      - name: Build and test
        working-directory: AptuKMP
        run: ./gradlew :shared:assembleDebug :androidApp:assembleDebug :shared:testDebugUnitTest :androidApp:testDebugUnitTest --parallel --build-cache

  ci-result:
    name: CI Result
    runs-on: ubuntu-24.04
    permissions: {}
    if: always()
    needs: [build]
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs passed or were skipped."
